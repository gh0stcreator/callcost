        const digits = String(value).replace(/\D+/g, "");
        return digits ? Number(digits) : 0;
      }

      function formatMoney(value) {
        return new Intl.NumberFormat("ru-RU", {
          maximumFractionDigits: 0,
        }).format(Math.max(0, Math.round(value)));
      }

      function maskSalary(value) {
        return formatMoney(value).replace(/\d/g, "*");
      }

      function typingSalary(value) {
        if (!value) return "";

        const formatted = formatMoney(value);
        const revealLastDigit = Date.now() < state.revealUntil;
        let digitIndex = 0;
        const digitCount = String(value).length;

        return formatted.replace(/\d/g, (digit) => {
          const isLastDigit = digitIndex === digitCount - 1;
          digitIndex += 1;
          return revealLastDigit && isLastDigit ? digit : "*";
        });
      }

      function scheduleRevealMask() {
        clearTimeout(revealMaskHandle);

        if (!state.editing || !state.salary || Date.now() >= state.revealUntil) {
          return;
        }

        revealMaskHandle = window.setTimeout(() => {
          if (!state.editing) return;
          renderSalaryState();
        }, Math.max(0, state.revealUntil - Date.now()));
      }

      function getElapsedMs() {
        if (!state.running || !state.startedAt) return state.elapsedMs;
        return state.elapsedMs + (Date.now() - state.startedAt);
      }

      function getParticipantAmount(salary, running, startedAt, elapsedMs) {
        if (!salary) return 0;
        const baseElapsed = Number(elapsedMs) || 0;
        const liveElapsed = running && startedAt ? Math.max(0, Date.now() - Number(startedAt)) : 0;
        const totalElapsed = baseElapsed + liveElapsed;
        return (salary / WORK_SECONDS_IN_MONTH) * (totalElapsed / 1000);
      }

      function getLocalAmount() {
        return getParticipantAmount(state.salary, state.running, state.startedAt, state.elapsedMs);
      }

      function pruneStalePeers() {
        const now = Date.now();
        Object.keys(state.peers).forEach((peerId) => {
          const peer = state.peers[peerId];
          const freshnessMark = Math.max(
            Number(peer?.updatedAt) || 0,
            Number(peer?.lastSeen) || 0
          );
          if (!peer || now - freshnessMark > REMOTE_SNAPSHOT_TTL_MS) {
            delete state.peers[peerId];
          }
        });
        return Object.keys(state.peers).length;
      }

      function shouldSyncPresence() {
        return state.roomIds.length > 0 || isMeetingRoomResolved();
      }

      function shouldUseSharedTotals() {
        if (!shouldSyncPresence()) return false;
        const activePeers = pruneStalePeers();
        if (state.meetingParticipantsCount >= 2) return true;
        if (state.meetingParticipantsCount === 0 && activePeers > 0) return true;
        return false;
      }

      function getTotalAmount() {
        if (!shouldUseSharedTotals()) {
          state.peers = {};
          return getLocalAmount();
        }
        let total = getLocalAmount();
        Object.keys(state.peers).forEach((peerId) => {
          const peer = state.peers[peerId];
          if (!peer) return;
          total += getParticipantAmount(peer.salary, peer.running, peer.startedAt, peer.elapsedMs);
        });
        return total;
      }

      function getActivePeerCount() {
        if (!shouldSyncPresence()) {
          state.peers = {};
          return 0;
        }
        return pruneStalePeers();
      }

      function getSyncDebugText(totalAmount) {
        const sharedMode = shouldUseSharedTotals();
        const peers = getActivePeerCount();
        const meeting = state.meetingParticipantsCount || 0;
        const localSalaries = state.salary > 0 ? [state.salary] : [];
        const peerSalaries = sharedMode
          ? Object.values(state.peers)
              .map((peer) => Number(peer.salary) || 0)
              .filter((salary) => salary > 0)
          : [];
        const allSalaries = [...localSalaries, ...peerSalaries];
        const totalSalary = allSalaries.reduce((sum, salary) => sum + salary, 0);
        const salaryList = allSalaries.length
          ? allSalaries
              .slice(0, 6)
              .map((salary) => formatMoney(salary))
              .join("+")
          : "0";
        const room =
          state.roomId === "local-room"
            ? "local-room"
            : `${state.roomId.slice(0, 10)}…`;
        const appCount = sharedMode ? peers + 1 : 1;
        return `v:${BUILD_ID} · meet:${meeting} · app:${appCount} · shared:${sharedMode ? "on" : "off"} · salaries:${salaryList} · sum:${formatMoney(totalSalary)} · total:${formatMoney(totalAmount)} · fb:${syncBackend === "none" ? "off" : "on"} · room:${room}`;
      }

      function getCountedSalaryCount() {
        const sharedMode = shouldUseSharedTotals();
        const localCount = state.salary > 0 ? 1 : 0;
        if (!sharedMode) return localCount;
        const peerCount = Object.values(state.peers)
          .map((peer) => Number(peer.salary) || 0)
          .filter((salary) => salary > 0).length;
        return localCount + peerCount;
      }

      function formatSalaryWord(count) {
        const mod10 = count % 10;
        const mod100 = count % 100;
        if (mod10 === 1 && mod100 !== 11) return "зарплата";
        if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return "зарплаты";
        return "зарплат";
      }

      function getClientId() {
        const existing = localStorage.getItem(CLIENT_ID_KEY);
        if (existing) return existing;
        const fresh = `u_${Math.random().toString(36).slice(2, 10)}`;
        localStorage.setItem(CLIENT_ID_KEY, fresh);
        return fresh;
      }

      function getRoomIdFromMeetingContext(context) {
        const meetingUUID =
          context?.meetingUUID ||
          context?.meetingUuid ||
          context?.meetingId ||
          context?.mid ||
          "";
        if (!meetingUUID) return "";
        return String(meetingUUID).replace(/[.#$/[\]]/g, "_");
      }

      function getRoomIdFromRunningContext(context) {
        const meetingLike =
          context?.meetingUUID ||
          context?.meetingUuid ||
          context?.meetingId ||
          context?.mid ||
          context?.context?.meetingUUID ||
          context?.context?.meetingId ||
          "";
        if (!meetingLike) return "";
        return String(meetingLike).replace(/[.#$/[\]]/g, "_");
      }

      function getRoomIdFromRunningSession(context) {
        const sessionLike = context?.sessionId || context?.context?.sessionId || "";
        if (!sessionLike) return "";
        return `sess_${String(sessionLike).replace(/[.#$/[\]]/g, "_").slice(0, 120)}`;
      }

      function getRoomIdFromParticipants(payload) {
        const participants = payload?.participants || [];
        if (participants.length < 2) return "";
        const ids = participants
          .map((p) => String(p?.participantUUID || p?.userId || p?.id || ""))
          .filter(Boolean)
          .sort();
        if (ids.length < 2) return "";
        return `participants_${ids.join("_").slice(0, 120)}`.replace(/[.#$/[\]]/g, "_");
      }

      function getRoomIdsFromParticipants(payload) {
        const participants = payload?.participants || [];
        if (participants.length < 2) return [];

        const roomIds = [];
        const idsRoom = getRoomIdFromParticipants(payload);
        if (idsRoom) roomIds.push(idsRoom);

        const normalizedNames = participants
          .map((p) => String(
            p?.displayName ||
            p?.screenName ||
            p?.userName ||
            p?.name ||
            ""
          ).trim().toLowerCase())
          .filter(Boolean)
          .sort();

        if (normalizedNames.length >= 2) {
          roomIds.push(`participants_names_${hashString(normalizedNames.join("|"))}`);
        }

        return roomIds;
      }

      function hashString(input) {
        let hash = 2166136261;
        for (let i = 0; i < input.length; i += 1) {
          hash ^= input.charCodeAt(i);
          hash +=
            (hash << 1) +
            (hash << 4) +
            (hash << 7) +
            (hash << 8) +
            (hash << 24);
        }
        return (hash >>> 0).toString(36);
      }

      function getRoomIdFromUrlSignals() {
        const sources = [];
        const pushSource = (raw) => {
          if (!raw) return;
          try {
            const parsed = new URL(raw, window.location.origin);
            sources.push(parsed);
          } catch {}
        };

        pushSource(window.location.href);
        pushSource(document.referrer);

        const meetingKeyHints = [
          "meetinguuid",
          "meetingid",
          "meetingnumber",
          "meeting_no",
          "meetingno",
          "mn",
          "confno",
          "confid",
          "conferenceid",
          "sessionid",
          "sid",
          "roomid",
        ];

        for (const url of sources) {
          for (const [key, value] of url.searchParams.entries()) {
            if (!value) continue;
            const normalizedKey = key.toLowerCase();
            if (meetingKeyHints.some((needle) => normalizedKey.includes(needle))) {
              return `url_${String(value).replace(/[.#$/[\]]/g, "_").slice(0, 120)}`;
            }
          }

          const joined = `${url.pathname} ${url.search} ${url.hash}`;
          const meetingNoMatch = joined.match(/\b\d{9,12}\b/);
          if (meetingNoMatch && meetingNoMatch[0]) {
            return `mn_${meetingNoMatch[0]}`;
          }

          const uuidLikeMatch = joined.match(/\b[a-f0-9]{32,64}\b/i);
          if (uuidLikeMatch && uuidLikeMatch[0]) {
            return `uuid_${uuidLikeMatch[0].toLowerCase().slice(0, 64)}`;
          }

          // Intentionally skip generic long-token fallback:
          // Zoom can expose client-specific tokens that split users into different rooms.
        }

        return "";
      }

      function isMeetingRoomResolved(roomId = state.roomId) {
        return Boolean(roomId && roomId !== "local-room");
      }

      function normalizeRoomIds(roomIds) {
        const seen = new Set();
        const normalized = [];
        roomIds.forEach((id) => {
          const value = String(id || "").trim();
          if (!value || value === "local-room") return;
          if (seen.has(value)) return;
          seen.add(value);
          normalized.push(value);
        });
        return normalized;
      }

      function applyRoomIds(nextRoomIds) {
        const normalized = normalizeRoomIds(nextRoomIds);
        const nextPrimaryRoomId = normalized[0] || "local-room";
        const previousPrimaryRoomId = state.roomId;
        const previousSignature = state.roomIds.join("|");
        const nextSignature = normalized.join("|");

        if (previousPrimaryRoomId === nextPrimaryRoomId && previousSignature === nextSignature) {
          return;
        }

        const shouldResetRuntime =
          isMeetingRoomResolved(previousPrimaryRoomId) &&
          isMeetingRoomResolved(nextPrimaryRoomId) &&
          previousPrimaryRoomId !== nextPrimaryRoomId;

        stopSync();
        state.roomId = nextPrimaryRoomId;
        state.roomIds = normalized;
        state.peers = {};

        if (shouldResetRuntime) {
          resetMeetingRuntimeState();
          autoStartForMeetingIfSalaryExists();
        }

        setupBroadcastSync();
        setupFirebaseSync();
        publishPresence();
        render();
      }

      async function discoverActiveRoomAliases() {
        if (!FIREBASE_CONFIG?.databaseURL) return;
        if (getActivePeerCount() > 0) return;

        const baseUrl = FIREBASE_CONFIG.databaseURL.replace(/\/+$/, "");
        try {
          const roomsResponse = await fetch(`${baseUrl}/rooms.json`, {
            method: "GET",
            cache: "no-store",
          });
          if (!roomsResponse.ok) return;
          const rooms = await roomsResponse.json();
          if (!rooms || typeof rooms !== "object") return;

          const candidates = Object.keys(rooms)
            .filter((roomId) => roomId && !state.roomIds.includes(roomId))
            .slice(0, ROOM_DISCOVERY_MAX_ROOMS);
          if (!candidates.length) return;

          const scores = await Promise.all(
            candidates.map(async (roomId) => {
              try {
                const participantsResponse = await fetch(
                  `${baseUrl}/rooms/${roomId}/participants.json`,
                  { method: "GET", cache: "no-store" }
                );
                if (!participantsResponse.ok) return { roomId, score: 0 };
                const participants = await participantsResponse.json();
                if (!participants || typeof participants !== "object") {
                  return { roomId, score: 0 };
                }
                const now = Date.now();
                let active = 0;
                Object.entries(participants).forEach(([id, payload]) => {
                  if (id === state.clientId || !payload || typeof payload !== "object") return;
                  const updatedAt = Number(payload.updatedAt) || 0;
                  if (!updatedAt) return;
                  if (now - updatedAt <= REMOTE_SNAPSHOT_TTL_MS) active += 1;
                });
                return { roomId, score: active };
              } catch {
                return { roomId, score: 0 };
              }
            })
          );

          const best = scores
            .filter((entry) => entry.score > 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, 3)
            .map((entry) => entry.roomId);

          if (!best.length) return;
          applyRoomIds([...state.roomIds, ...best]);
        } catch {}
      }

      function startRoomDiscoveryLoop() {
        clearInterval(roomDiscoveryHandle);
        roomDiscoveryHandle = window.setInterval(() => {
          discoverActiveRoomAliases();
        }, ROOM_DISCOVERY_INTERVAL_MS);
        discoverActiveRoomAliases();
      }

      async function resolveRoomIds() {
        const candidates = [];
        let runningContext = null;

        if (zoomSdkApi?.getMeetingContext) {
          try {
            const context = await zoomSdkApi.getMeetingContext();
            candidates.push(getRoomIdFromMeetingContext(context));
          } catch {}
        }
        if (zoomSdkApi?.getRunningContext) {
          try {
            runningContext = await zoomSdkApi.getRunningContext();
            candidates.push(getRoomIdFromRunningContext(runningContext));
            candidates.push(getRoomIdFromRunningSession(runningContext));
          } catch {}
        }
        if (zoomSdkApi?.getMeetingParticipants) {
          try {
            const participantsPayload = await zoomSdkApi.getMeetingParticipants();
            candidates.push(...getRoomIdsFromParticipants(participantsPayload));
          } catch {}
        }

        candidates.push(getRoomIdFromUrlSignals());
        return normalizeRoomIds(candidates);
      }

      function upsertPeer(peerId, payload, source) {
        if (!peerId || peerId === state.clientId || !payload) return;
        const updatedAt = Number(payload.updatedAt) || Date.now();
        if (updatedAt > Date.now() + 15000) return;
        if (Date.now() - updatedAt > REMOTE_SNAPSHOT_TTL_MS) return;
        state.peers[peerId] = {
          salary: Number(payload.salary) || 0,
          running: Boolean(payload.running),
          startedAt: payload.startedAt ? Number(payload.startedAt) : null,
          elapsedMs: Number(payload.elapsedMs) || 0,
          updatedAt,
          source,
          lastSeen: Date.now(),
        };
      }

      function getSelfSnapshot() {
        return {
          salary: state.salary,
          running: state.running,
          startedAt: state.startedAt,
          elapsedMs: state.elapsedMs,
          updatedAt: Date.now(),
        };
      }

      function broadcastSnapshot() {
        if (!bcChannels.length) return;
        const snapshot = getSelfSnapshot();
        bcChannels.forEach(({ roomId, channel }) => {
          try {
            channel.postMessage({
              type: "state",
              roomId,
              userId: state.clientId,
              payload: snapshot,
            });
          } catch {}
        });
      }

      function publishFirebaseSnapshot() {
        const snapshot = getSelfSnapshot();
        if (firebaseSelfRefs.length) {
          firebaseSelfRefs.forEach((ref) => {
            try {
              ref.set(snapshot);
            } catch {}
          });
          return;
        }
        if (!firebaseRestBaseUrl || !state.roomIds.length) return;
        state.roomIds.forEach((roomId) => {
          const url = `${firebaseRestBaseUrl}/rooms/${roomId}/participants/${state.clientId}.json`;
          fetch(url, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(snapshot),
            keepalive: true,
          }).catch(() => {});
        });
      }

      function publishPresence() {
        if (!shouldSyncPresence()) return;
        broadcastSnapshot();
        publishFirebaseSnapshot();
      }

      function setupBroadcastSync() {
        if (!shouldSyncPresence()) return;
        bcChannels.forEach(({ channel }) => {
          try {
            channel.close();
          } catch {}
        });
        bcChannels = [];
        try {
          state.roomIds.forEach((roomId) => {
            const channel = new BroadcastChannel(`callcost:${roomId}`);
            channel.onmessage = (event) => {
              const data = event?.data;
              if (!data || data.type !== "state") return;
              if (!state.roomIds.includes(String(data.roomId || ""))) return;
              upsertPeer(String(data.userId || ""), data.payload, `bc:${roomId}`);
            };
            bcChannels.push({ roomId, channel });
          });
          publishPresence();
        } catch {
          bcChannels = [];
        }
      }

      function setupFirebaseSync() {
        if (!shouldSyncPresence()) return;
        if (!FIREBASE_CONFIG) return;
        if (window.firebase) {
          try {
            const app = firebase.apps.length
              ? firebase.apps[0]
              : firebase.initializeApp(FIREBASE_CONFIG);
            firebaseDb = app.database();
            firebaseParticipantsRefs = [];
            firebaseSelfRefs = [];
            state.roomIds.forEach((roomId) => {
              const participantsRef = firebaseDb.ref(`rooms/${roomId}/participants`);
              const selfRef = participantsRef.child(state.clientId);
              selfRef.onDisconnect().remove();
              participantsRef.on("value", (snap) => {
                const participants = snap.val() || {};
                Object.keys(participants).forEach((id) => {
                  if (id === state.clientId) return;
                  upsertPeer(id, participants[id], `firebase-sdk:${roomId}`);
                });
              });
              firebaseParticipantsRefs.push(participantsRef);
              firebaseSelfRefs.push(selfRef);
            });
            syncBackend = "firebase-sdk";
            publishFirebaseSnapshot();
            return;
          } catch {}
        }

        if (!FIREBASE_CONFIG.databaseURL) return;
        firebaseRestBaseUrl = FIREBASE_CONFIG.databaseURL.replace(/\/+$/, "");
        syncBackend = "firebase-rest";
        clearInterval(firebaseRestPollHandle);
        firebaseRestPollHandle = window.setInterval(() => {
          state.roomIds.forEach((roomId) => {
            const url = `${firebaseRestBaseUrl}/rooms/${roomId}/participants.json`;
            fetch(url, { method: "GET", cache: "no-store" })
              .then((res) => (res.ok ? res.json() : null))
              .then((participants) => {
                if (!participants || typeof participants !== "object") return;
                Object.keys(participants).forEach((id) => {
                  if (id === state.clientId) return;
                  upsertPeer(id, participants[id], `firebase-rest:${roomId}`);
                });
              })
              .catch(() => {});
          });
        }, 1000);
        publishFirebaseSnapshot();
      }

      function resetMeetingRuntimeState() {
        state.running = false;
        state.startedAt = null;
        state.elapsedMs = 0;
        state.peers = {};
      }

      function autoStartForMeetingIfSalaryExists() {
        if (!state.salary) return;
        state.editing = false;
        state.forceSalaryScreen = false;
        state.running = true;
        state.startedAt = Date.now();
        state.elapsedMs = 0;
      }

      function startMeetingParticipantsPoll() {
        clearInterval(meetingParticipantsPollHandle);

        const updateCount = async () => {
          const previousCount = state.meetingParticipantsCount;
          let participantsCountResolved = false;
          try {
            if (zoomSdkApi?.getMeetingParticipants) {
              const payload = await zoomSdkApi.getMeetingParticipants();
              state.meetingParticipantsCount = Array.isArray(payload?.participants)
                ? payload.participants.length
                : 0;
              participantsCountResolved = true;
            }
          } catch {
            participantsCountResolved = false;
          }

          if (!participantsCountResolved && previousCount > 0) {
            state.meetingParticipantsCount = previousCount;
          }

          const detectedRoomIds = await resolveRoomIds();
          applyRoomIds(detectedRoomIds);

          if (
            participantsCountResolved &&
            previousCount > 0 &&
            state.meetingParticipantsCount === 0 &&
            state.running
          ) {
            state.elapsedMs = getElapsedMs();
            state.startedAt = null;
            state.running = false;
            publishPresence();
            render();
          }
        };

        updateCount();
        meetingParticipantsPollHandle = window.setInterval(updateCount, 4000);
      }

      async function initPresenceSync() {
        state.clientId = getClientId();
        const roomIds = await resolveRoomIds();
        state.roomIds = roomIds;
        state.roomId = roomIds[0] || "local-room";
        resetMeetingRuntimeState();
        setupBroadcastSync();
        setupFirebaseSync();
        startMeetingParticipantsPoll();
        startRoomDiscoveryLoop();
        autoStartForMeetingIfSalaryExists();
        publishPresence();
        render();
      }

      function stopSync() {
        bcChannels.forEach(({ channel }) => {
          try {
            channel.close();
          } catch {}
        });
        bcChannels = [];

        firebaseParticipantsRefs.forEach((ref) => {
          try {
            ref.off();
          } catch {}
        });
        firebaseParticipantsRefs = [];

        firebaseSelfRefs.forEach((ref) => {
          try {
            ref.remove();
          } catch {}
        });
        firebaseSelfRefs = [];

        if (firebaseRestBaseUrl) {
          state.roomIds.forEach((roomId) => {
            const url = `${firebaseRestBaseUrl}/rooms/${roomId}/participants/${state.clientId}.json`;
            fetch(url, { method: "DELETE", keepalive: true }).catch(() => {});
          });
          firebaseRestBaseUrl = null;
        }
        clearInterval(firebaseRestPollHandle);
        firebaseRestPollHandle = null;
        clearInterval(roomDiscoveryHandle);
        roomDiscoveryHandle = null;
        syncBackend = "none";
      }

      function getHint(amount) {
        if (amount >= 1 && amount <= 15) {
          const idx = Math.min(
            lowAmountHints.length - 1,
            Math.floor((Math.max(1, amount) - 1) / 5)
          );
          return lowAmountHints[idx];
        }

        const bucket = Math.max(0, Math.floor(amount / HINT_BUCKET_RUBLES));
        const item = hintItems[bucket % hintItems.length];
        const quantity = Math.max(1, Math.round(Math.max(amount, item.price) / item.price));
        const mod10 = quantity % 10;
        const mod100 = quantity % 100;
        const formIndex =
          mod10 === 1 && mod100 !== 11
            ? 0
            : mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)
              ? 1
              : 2;
        return `или ${quantity} ${item.forms[formIndex]}…`;
      }

      function persist() {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            salary: state.salary,
            editing: false,
            hint: state.hint,
            forceSalaryScreen: false,
          })
        );
      }

      function resetApp() {
        clearTimeout(hintFadeHandle);
        clearTimeout(revealMaskHandle);
        localStorage.removeItem(STORAGE_KEY);
        state.salary = 0;
        state.editing = false;
        state.running = false;
        state.startedAt = null;
        state.elapsedMs = 0;
        state.hint = DEFAULT_HINT;
        state.forceSalaryScreen = false;
        state.peers = {};
        refs.salaryInput.value = "";
        refs.amountHint.textContent = DEFAULT_HINT;
        refs.salaryInput.blur();
        closeMenu();
        publishPresence();
        render();
      }

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (typeof parsed.salary === "number") state.salary = parsed.salary;
          if (typeof parsed.hint === "string") state.hint = parsed.hint;
        } catch {}
      }

      function resetResetButton() {
        resetConfirmArmed = false;
        refs.resetButton.textContent = "Сбросить";
        refs.resetButton.className = "menu-item is-danger";
      }

      function openMenu() {
        refs.menuPopover.hidden = false;
        refs.menuButton.classList.add("is-open");
        refs.menuButton.setAttribute("aria-expanded", "true");
      }

      function closeMenu() {
        refs.menuPopover.hidden = true;
        refs.menuButton.classList.remove("is-open");
        refs.menuButton.setAttribute("aria-expanded", "false");
        resetResetButton();
      }

      function toggleMenu() {
        if (refs.menuPopover.hidden) {
          openMenu();
        } else {
          closeMenu();
        }
      }

      function setHint(nextHint, immediate = false) {
        if (state.hint === nextHint && !immediate) return;

        if (immediate) {
          clearTimeout(hintFadeHandle);
          hintFadeHandle = null;
          state.hint = nextHint;
          refs.amountHint.textContent = nextHint;
          refs.amountHint.classList.remove("is-fading");
          lastHintSwapAt = Date.now();
          return;
        }

        const now = Date.now();
        if (hintFadeHandle) {
          state.hint = nextHint;
          refs.amountHint.textContent = nextHint;
          refs.amountHint.classList.remove("is-fading");
          clearTimeout(hintFadeHandle);
          hintFadeHandle = null;
          lastHintSwapAt = now;
          return;
        }
        if (now - lastHintSwapAt < HINT_MIN_SWAP_MS) {
          return;
        }

        refs.amountHint.classList.add("is-fading");
        clearTimeout(hintFadeHandle);
        hintFadeHandle = window.setTimeout(() => {
          state.hint = nextHint;
          refs.amountHint.textContent = nextHint;
          refs.amountHint.classList.remove("is-fading");
          lastHintSwapAt = Date.now();
          hintFadeHandle = null;
          persist();
        }, HINT_FADE_MS);
      }

      function renderSalaryState() {
        refs.privacyPill.hidden = false;
        refs.salaryTitle.textContent = "Введите зарплату";
        refs.salaryPanel.hidden = false;
        refs.meterPanel.hidden = true;

        let text = "Сумма";
        let displayClassName = "input-box__display is-placeholder";
        let currencyClassName = "input-box__currency is-placeholder";
        refs.salaryTitle.className = "title is-light";
        refs.salaryCaret.hidden = true;

        if (state.salary > 0 && !state.editing) {
          text = maskSalary(state.salary);
          displayClassName = "input-box__display is-filled";
          currencyClassName = "input-box__currency is-filled";
        }

        if (state.editing) {
          refs.salaryTitle.className = "title is-regular";
          refs.salaryCaret.hidden = false;
          if (state.salary > 0) {
            text = typingSalary(state.salary);
            displayClassName = "input-box__display is-filled";
            currencyClassName = "input-box__currency is-filled";
            scheduleRevealMask();
          }
        }

        refs.salaryDisplay.textContent = text;
        refs.salaryDisplay.className = displayClassName;
        refs.salaryCurrency.className = currencyClassName;
        refs.startButton.classList.toggle("is-ready", state.salary > 0);
      }

      function renderMeterState() {
        refs.salaryPanel.hidden = true;
        refs.meterPanel.hidden = false;

        const amount = getTotalAmount();
        const countedSalaryCount = getCountedSalaryCount();
        refs.amountValue.textContent = formatMoney(amount);
        setHint(getHint(amount));
        refs.syncMeta.textContent = `Учитывается ${countedSalaryCount} ${formatSalaryWord(countedSalaryCount)}`;
        refs.syncDebug.hidden = !DEBUG_MODE;
        if (DEBUG_MODE) {
          refs.syncDebug.textContent = getSyncDebugText(amount);
        }

        if (state.running) {
          refs.meterButton.ariaLabel = "Пауза";
          refs.meterButtonIcon.src = "./assets/pause.svg";
          refs.meterButtonIcon.className = "meter-button__icon";
        } else {
          refs.meterButton.ariaLabel = "Продолжить";
          refs.meterButtonIcon.src = "./assets/play.svg";
          refs.meterButtonIcon.className = "meter-button__icon is-play";
        }
      }

      function render() {
        if (
          state.forceSalaryScreen ||
          !state.salary ||
          (state.elapsedMs === 0 && !state.running)
        ) {
          renderSalaryState();
          return;
        }

        renderMeterState();
      }

      function focusInput() {
        state.editing = true;
        state.forceSalaryScreen = true;
        refs.salaryInput.focus();
        const length = refs.salaryInput.value.length;
        refs.salaryInput.setSelectionRange(length, length);
        render();
      }

      function handleStart() {
        if (!state.salary) {
          focusInput();
          return;
        }

        state.editing = false;
        state.forceSalaryScreen = false;
        if (!state.running) {
          state.running = true;
          state.startedAt = Date.now();
        }
        persist();
        publishPresence();
        render();
      }

      function handleToggle() {
        if (!state.salary) return;

        if (state.running) {
          state.elapsedMs = getElapsedMs();
          state.startedAt = null;
          state.running = false;
        } else {
          state.running = true;
          state.startedAt = Date.now();
        }

        persist();
        publishPresence();
        render();
      }

      function handleEditSalary() {
        if (state.running) {
          state.elapsedMs = getElapsedMs();
          state.startedAt = null;
          state.running = false;
        }
        state.editing = true;
        state.forceSalaryScreen = true;
        persist();
        publishPresence();
        closeMenu();
        focusInput();
      }

      function handleResetAction() {
        if (!resetConfirmArmed) {
          resetConfirmArmed = true;
          refs.resetButton.textContent = "Подтвердить сброс";
          refs.resetButton.className = "menu-item is-danger is-confirm";
          return;
        }
        resetApp();
      }

      function startTicker() {
        clearInterval(tickHandle);
        tickHandle = window.setInterval(() => {
          if (!state.running) return;
          renderMeterState();
        }, 100);
        clearInterval(syncPulseHandle);
        syncPulseHandle = window.setInterval(() => {
          publishPresence();
        }, 1000);
      }

      async function initZoom() {
        if (!zoomSdkApi || !zoomSdkApi.config) return;
        try {
          await zoomSdkApi.config({
            popoutSize: { width: 369, height: 698 },
            size: { width: 369, height: 698 },
            capabilities: ["getMeetingContext", "getMeetingParticipants", "getRunningContext"],
          });
        } catch {}
      }

      load();
      refs.salaryInput.value = state.salary ? String(state.salary) : "";
      refs.amountHint.textContent = state.hint;

      refs.salaryInput.addEventListener("input", () => {
        state.salary = normalizeSalary(refs.salaryInput.value);
        state.revealUntil = state.salary ? Date.now() + DIGIT_REVEAL_MS : 0;
        persist();
        publishPresence();
        render();
      });

      refs.salaryInput.addEventListener("focus", () => {
        state.editing = true;
        if (state.salary > 0) {
          scheduleRevealMask();
        }
        render();
      });

      refs.salaryInput.addEventListener("blur", () => {
        state.editing = false;
        state.revealUntil = 0;
        clearTimeout(revealMaskHandle);
        publishPresence();
        render();
      });

      refs.salaryInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          handleStart();
          refs.salaryInput.blur();
        }
      });

      refs.startButton.addEventListener("click", handleStart);
      refs.meterButton.addEventListener("click", handleToggle);
      refs.inputBox.addEventListener("click", focusInput);
      refs.salaryDisplay.addEventListener("click", focusInput);
      refs.salaryTitle.addEventListener("click", focusInput);
      refs.menuButton.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleMenu();
      });
      refs.menuPopover.addEventListener("click", (event) => {
        event.stopPropagation();
      });
      refs.editSalaryButton.addEventListener("click", handleEditSalary);
      refs.resetButton.addEventListener("click", handleResetAction);
      document.addEventListener("click", () => {
        if (!refs.menuPopover.hidden) closeMenu();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeMenu();
      });
      window.addEventListener("beforeunload", stopSync);
      window.addEventListener("resize", updateViewportScale);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", updateViewportScale);
      }

      updateViewportScale();
      render();
      startTicker();
      initZoom().finally(() => {
        initPresenceSync();
      });
    </script>
  </body>
</html>
